<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibefy Challenges – MVP</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; background: #0f0f12; color: #e4e4e7; }
    a { color: #a78bfa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #71717a; margin-bottom: 1.5rem; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    .challenge { border: 1px solid #3f3f46; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
    .challenge a { display: block; }
    .challenge .title { font-weight: 600; }
    .challenge .meta { color: #71717a; font-size: 0.875rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState } = React;

    const challenges = [
      { id: '1', title: 'E-commerce de Moda y Tecnología', difficulty: 'medium', date: '2/7/2026', description: 'Plataformas de comercio electrónico: moda juvenil y tecnología.' },
      { id: '2', title: 'Networking para Desarrolladores', difficulty: 'medium', date: '2/7/2026', description: 'Herramientas para networking entre desarrolladores en eventos.' },
      { id: '3', title: 'Conexiones y Gestión Temporal', difficulty: 'medium', date: '2/7/2026', description: 'Conexión entre profesionales y gestión de recursos temporales.' },
      { id: '4', title: 'Asistentes Inteligentes Personalizados', difficulty: 'medium', date: '2/7/2026', description: 'IA para asistencia personalizada en finanzas, estudio, hogar.' },
    ];

    function App() {
      return (
        <>
          <nav>
            <a href="#challenges">Challenges</a>
            <a href="#teams">Teams</a>
            <a href="#submissions">Submissions</a>
            <a href="#rankings">Rankings</a>
          </nav>
          <h1>Challenges</h1>
          <p className="subtitle">Browse hackathon challenges</p>
          <div role="list">
            {challenges.map((c) => (
              <article key={c.id} className="challenge" role="listitem">
                <a href={`#challenge-${c.id}`}>
                  <span className="title">{c.title}</span>
                  <span className="meta">{c.difficulty} · {c.date} · {c.description}</span>
                </a>
              </article>
            ))}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
